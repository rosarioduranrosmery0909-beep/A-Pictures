<!-- public/index.html -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-Pictures</title>

<style>

:root{
  --pink:#ff4db8;
  --blue:#0b4dbb;
  --dark:#0f172a;
  --card:#1e293b;
  --border:#334155;
  --text:#f8fafc;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  background:linear-gradient(180deg,#0f172a,#020617);
  color:white;
}

/* LOGIN */

.login-box{
  width:350px;
  margin:120px auto;
  padding:30px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  text-align:center;
}

.login-box h2{
  margin-bottom:20px;
  font-size:42px;
}

.login-box input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:#020617;
  color:white;
}

.login-actions{
  display:flex;
  gap:10px;
}

.btn-login{
  background:var(--blue);
}

.btn-register{
  background:var(--pink);
}

/* HEADER */

header{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  background:#0f172a;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:999;
}

.logo{
  font-size:30px;
  font-weight:900;
}

.logo span:first-child{
  color:var(--pink);
}

.logo span:last-child{
  color:var(--blue);
}

.logout-btn{
  width:auto;
  padding:10px 15px;
  background:var(--pink);
}

/* LAYOUT */

.main-layout{
  display:flex;
  max-width:1200px;
  margin:auto;
  gap:20px;
}

/* SIDEBAR */

.sidebar{
  width:260px;
  background:var(--card);
  border-right:1px solid var(--border);
  padding:15px;
  min-height:100vh;
  position:sticky;
  top:70px;
}

.sidebar h3{
  margin-bottom:15px;
  color:var(--pink);
}

#userSearch{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#020617;
  color:white;
  margin-bottom:15px;
}

.user-item{
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.2s;

  display:flex;
  justify-content:space-between;
  align-items:center;
  
}

.user-item:hover{
  background:var(--blue);
}

/* FEED */

.container{
  flex:1;
  max-width:650px;
  margin:100px auto;
  padding:15px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:15px;
  padding:15px;
  margin-bottom:20px;
}

textarea,input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#020617;
  color:white;
  margin:8px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.publish-btn{
  background:var(--blue);
}

.post img{
  width:100%;
  margin-top:12px;
  border-radius:12px;
  max-height:450px;
  object-fit:cover;
}

.tags{
  color:var(--pink);
  margin:6px 0;
}

/* MENU */

.post-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.post-menu{
  position:relative;
}

.menu-btn{
  width:auto;
  background:none;
  font-size:24px;
  padding:4px 10px;
}

.dropdown{
  display:none;
  position:absolute;
  right:0;
  top:35px;
  background:#020617;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}

.dropdown button{
  background:none;
  width:120px;
}

.dropdown button:hover{
  background:red;
}

.post-menu.active .dropdown{
  display:block;
}

/* RESPONSIVE */

@media(max-width:900px){

  .main-layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    min-height:auto;
    position:relative;
    top:0;
  }

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginBox" class="login-box">

  <h2>A-Pictures</h2>

  <input
  type="text"
  id="loginUser"
  placeholder="Usuario"
  >

  <input
  type="password"
  id="loginPass"
  placeholder="ContraseÃ±a"
  >

  <div class="login-actions">

    <button
    class="btn-login"
    onclick="login()">
      Entrar
    </button>

    <button
    class="btn-register"
    onclick="register()">
      Registrar
    </button>

  </div>

</div>

<!-- APP -->

<div id="app" style="display:none;">

<header>

  <div class="logo">
    <span>A-</span><span>Pictures</span>
  </div>

  <button
  class="logout-btn"
  onclick="logout()">
    Cerrar sesiÃ³n
  </button>

</header>

<div class="main-layout">

<!-- SIDEBAR -->

<div class="sidebar">

  <h3>Usuarios</h3>

  <input
  type="text"
  id="userSearch"
  placeholder="Buscar usuario..."
  onkeyup="renderUsers()"
  >

  <div id="usersList"></div>

</div>

<!-- FEED -->

<div class="container">

  <div class="card">

    <textarea
    id="text"
    placeholder="Â¿QuÃ© estÃ¡s pensando?"
    ></textarea>

    <input
    type="text"
    id="tags"
    placeholder="Etiquetas separadas por coma"
    >

    <input
    type="file"
    id="imageInput"
    accept="image/*"
    >

    <button
    class="publish-btn"
    onclick="addPost()">
      Publicar
    </button>

  </div>

  <div id="feed"></div>

</div>
</div>
</div>

<script src="script.js" defer></script>
</body>
</html>
